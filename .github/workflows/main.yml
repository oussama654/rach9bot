name: Telegram Auto Farmer Pro

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

# منع التداخل كلياً: لو اشتغل سيرفر جديد، يتم قتل السيرفر القديم فوراً لحماية حسابك وجلستك
concurrency:
  group: telegram-farmer-session
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Telegram Script
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      run: |
        timeout 5h python bot_farmer.py || true

